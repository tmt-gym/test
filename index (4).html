<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>링 위에서 나는 어떤 파이터일까?</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @font-face {
    font-family: 'Mujeokhaebeong';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2502-1@1.0/MarinesRegular.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: 'Mujeokhaebeong';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2502-1@1.0/MarinesBold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #fcf4ea;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #111;
    width: 100%;
    min-height: 100vh;
  }
  #app {
    max-width: 440px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 32px 24px 40px;
    animation: fadeIn 0.35s ease;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== 공통 컴포넌트 ===== */
  .btn-primary {
    display: block; width: 100%; padding: 16px;
    background: #111; color: #fcf4ea; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-secondary {
    display: block; width: 100%; padding: 14px;
    background: #fff; color: #111; border: 1px solid #ddd2bf;
    border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .btn-secondary:active { opacity: 0.85; transform: scale(0.98); }

  /* ===== 시작 화면 ===== */
  #screen-start { align-items: center; justify-content: center; text-align: center; }
  .glove-wrap { width: 110px; height: 110px; margin-bottom: 28px; }
  .badge {
    font-size: 13px; letter-spacing: 0.12em; color: #c93a38;
    font-weight: 600; margin-bottom: 14px; text-transform: uppercase;
  }
  .start-title {
    font-family: 'Mujeokhaebeong', sans-serif; font-weight: 700;
    font-size: 28px; color: #111;
    line-height: 1.4; margin-bottom: 14px;
  }
  .start-sub {
    font-size: 15px; color: #777; line-height: 1.6;
    margin-bottom: 48px;
  }
  .start-btn-wrap { width: 100%; margin-bottom: 20px; }
  .dot-row { display: flex; gap: 6px; justify-content: center; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: #ddd2bf; }
  .dot.on { background: #c93a38; width: 16px; border-radius: 2px; }

  /* ===== 질문 화면 ===== */
  #screen-quiz { justify-content: flex-start; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
  .progress-track { flex: 1; height: 4px; background: #ece2cd; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #c93a38; border-radius: 2px; transition: width 0.3s ease; }
  .progress-count { font-size: 12px; color: #999; min-width: 40px; text-align: right; }

  .q-type-tag {
    font-size: 11px; font-weight: 600; color: #c93a38;
    background: #fcebeb; display: inline-block; padding: 4px 10px;
    border-radius: 20px; margin-bottom: 16px; width: fit-content;
  }
  .q-text {
    font-size: 19px; font-weight: 700; color: #111;
    line-height: 1.5; margin-bottom: 32px;
  }
  .option-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .option-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; text-align: left; background: #fff;
    border: 1px solid #ddd2bf; border-radius: 12px;
    padding: 16px; font-size: 14px; color: #222;
    line-height: 1.5; cursor: pointer;
  }
  .option-btn:active { background: #f4ece0; transform: scale(0.99); }
  .option-letter {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: #f1efe8; color: #555; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .prev-btn {
    font-size: 13px; color: #999; background: none; border: none;
    cursor: pointer; padding: 8px 4px; width: fit-content;
  }

  /* ===== 결과 화면 ===== */
  #screen-result { align-items: center; padding-top: 28px; }
  .result-tag {
    font-size: 12px; font-weight: 600; color: #fcf4ea;
    background: #111; padding: 5px 12px; border-radius: 20px;
    margin-bottom: 18px;
  }
  .result-type-name {
    font-family: 'Mujeokhaebeong', sans-serif; font-weight: 700;
    font-size: 32px; color: #111; margin-bottom: 8px; text-align: center;
  }
  .result-copy-sub { font-size: 14px; color: #444; text-align: center; line-height: 1.6; margin-bottom: 10px; }
  .result-quote { font-size: 13px; color: #c93a38; text-align: center; margin-bottom: 24px; font-weight: 600; }
  .result-char-box {
    width: 100%; height: 230px; margin-bottom: 24px;
    display: flex; align-items: center; justify-content: center;
    color: #b3a78f; font-size: 12px; border: 1px dashed #d8cab0;
    border-radius: 14px; background: #fff;
  }
  .result-char-box img { width: 100%; height: 100%; object-fit: contain; border-radius: 14px; }
  .desc-card {
    width: 100%; background: #fff; border: 1px solid #e5dac5;
    border-radius: 14px; padding: 18px 20px; font-size: 14px;
    color: #333; line-height: 1.75; margin-bottom: 26px;
  }
  .chart-wrap { width: 100%; margin-bottom: 28px; }
  .feature-card {
    width: 100%; background: #111; border-radius: 14px;
    padding: 18px 20px; margin-bottom: 24px;
  }
  .feature-title { font-family: 'Mujeokhaebeong', sans-serif; font-weight: 700; font-size: 17px; color: #fcf4ea; text-align: center; margin-bottom: 14px; }
  .feature-item { display: flex; gap: 8px; font-size: 13px; color: #e8e0d2; line-height: 1.7; margin-bottom: 8px; }
  .feature-item:last-child { margin-bottom: 0; }
  .feature-dot { color: #e24b4a; flex-shrink: 0; }
  .strength-row { display: flex; gap: 8px; width: 100%; margin-bottom: 26px; }
  .strength-card {
    flex: 1; background: #fff; border: 1px solid #e5dac5;
    border-radius: 12px; padding: 14px;
  }
  .strength-label { font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; }
  .strength-text { font-size: 13px; color: #333; line-height: 1.55; }
  .section-label {
    font-size: 14px; color: #c93a38; font-weight: 700;
    margin-bottom: 12px; width: 100%; text-align: left;
  }
  .vs-row { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-bottom: 26px; }
  .vs-card {
    background: #fff; border: 1px solid #e5dac5; border-radius: 12px;
    padding: 14px; display: flex; align-items: center; gap: 12px;
  }
  .vs-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px; font-weight: 700;
  }
  .vs-best .vs-icon { background: #fcebeb; color: #791f1f; }
  .vs-worst .vs-icon { background: #f1efe8; color: #444441; }
  .vs-name { font-size: 14px; font-weight: 700; color: #111; }
  .vs-reason { font-size: 12px; color: #888; margin-top: 2px; }
  .other-types { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin-bottom: 28px; }
  .other-pill {
    font-size: 13px; color: #555; border: 1px solid #ddd2bf;
    background: #fff; border-radius: 20px; padding: 8px 16px;
    cursor: pointer;
  }
  .other-pill:active { background: #f4ece0; }
  .result-btn-row { display: flex; gap: 8px; width: 100%; }
  .result-btn-row .btn-primary, .result-btn-row .btn-secondary { flex: 1; }
</style>
</head>
<body>

<div id="app">

  <!-- ===================== 1. 시작 화면 ===================== -->
  <section class="screen active" id="screen-start">
    <div class="glove-wrap">
      <svg viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="복싱 글러브 아이콘">
        <rect x="20" y="35" width="48" height="42" rx="10" fill="#c93a38"/>
        <rect x="18" y="55" width="52" height="22" rx="8" fill="#a32d2d"/>
        <rect x="22" y="35" width="42" height="14" rx="7" fill="#c93a38"/>
        <rect x="28" y="22" width="12" height="18" rx="6" fill="#c93a38"/>
        <rect x="42" y="20" width="12" height="18" rx="6" fill="#c93a38"/>
        <rect x="56" y="24" width="10" height="15" rx="5" fill="#c93a38"/>
        <rect x="20" y="72" width="48" height="5" rx="2" fill="#791f1f"/>
      </svg>
    </div>
    <div class="badge">복싱 스타일 유형 검사</div>
    <h1 class="start-title">링 위에서 나는<br>어떤 파이터일까?</h1>
    <p class="start-sub">11가지 질문으로 알아보는<br>나만의 복싱 DNA</p>
    <div class="start-btn-wrap">
      <button class="btn-primary" onclick="startQuiz()">검사 시작하기</button>
    </div>
    <div class="dot-row">
      <div class="dot on"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </section>

  <!-- ===================== 2. 질문 화면 ===================== -->
  <section class="screen" id="screen-quiz">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-count" id="progress-count">1 / 11</div>
    </div>
    <div class="q-type-tag" id="q-type-tag">상황형</div>
    <h2 class="q-text" id="q-text">질문이 표시됩니다</h2>
    <div class="option-list" id="option-list"></div>
    <button class="prev-btn" id="prev-btn" onclick="prevQuestion()">← 이전으로</button>
  </section>

  <!-- ===================== 3. 결과 화면 ===================== -->
  <section class="screen" id="screen-result">
    <div class="result-tag">내 유형</div>
    <h1 class="result-type-name" id="result-type-name"></h1>
    <p class="result-copy-sub" id="result-copy-sub"></p>
    <p class="result-quote" id="result-quote"></p>

    <div class="result-char-box" id="result-char-box">캐릭터 일러스트</div>

    <div class="desc-card" id="result-desc"></div>

    <div class="chart-wrap">
      <div style="position: relative; height: 230px;">
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <div class="feature-card">
      <div class="feature-title" id="feature-title"></div>
      <div id="feature-list"></div>
    </div>

    <div class="strength-row">
      <div class="strength-card">
        <div class="strength-label">강한 상황</div>
        <div class="strength-text" id="strength-good"></div>
      </div>
      <div class="strength-card">
        <div class="strength-label">약한 상황</div>
        <div class="strength-text" id="strength-bad"></div>
      </div>
    </div>

    <div class="vs-row">
      <div class="section-label">스파링 궁합</div>
      <div class="vs-card vs-best">
        <div class="vs-icon">★</div>
        <div>
          <div class="vs-name" id="vs-best-name"></div>
          <div class="vs-reason" id="vs-best-reason"></div>
        </div>
      </div>
      <div class="vs-card vs-worst">
        <div class="vs-icon">×</div>
        <div>
          <div class="vs-name" id="vs-worst-name"></div>
          <div class="vs-reason" id="vs-worst-reason"></div>
        </div>
      </div>
    </div>

    <div class="section-label">다른 유형 보기</div>
    <div class="other-types" id="other-types"></div>

    <div class="result-btn-row">
      <button class="btn-primary" id="save-image-btn">이미지 저장</button>
      <button class="btn-secondary" onclick="restartQuiz()">다시 하기</button>
    </div>
  </section>

</div>

<script>
// ===================== 질문 데이터 =====================
// 유형 키: OUT(아웃복서) / SLU(슬러거) / SWA(인파이터) / BOP(복서-펀처) / COU(카운터펀처)

  },
  {
    type: "상황형",

      { text: "거리를 벌리고 정신을 가다듬는다", scores: { OUT: 2, SLU: 0, SWA: 0, BOP: 1, COU: 1 } },

];

// ===================== 유형별 결과 콘텐츠 =====================

const TYPE_ORDER = ["OUT", "SLU", "SWA", "BOP", "COU"];

// ===================== 상태 관리 =====================
let currentQuestionIndex = 0;
let userAnswers = [];
let radarChartInstance = null;

// ===================== 화면 전환 =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  currentQuestionIndex = 0;
  userAnswers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function restartQuiz() {
  showScreen('screen-start');
}

// ===================== 질문 렌더링 =====================
function renderQuestion() {
  const q = QUESTIONS[currentQuestionIndex];
  const total = QUESTIONS.length;

  const percent = ((currentQuestionIndex) / total) * 100;
  document.getElementById('progress-fill').style.width = percent + '%';
  document.getElementById('progress-count').textContent = (currentQuestionIndex + 1) + ' / ' + total;

  document.getElementById('q-type-tag').textContent = q.type;
  document.getElementById('q-text').textContent = q.text;

  const letters = ['A', 'B', 'C', 'D'];
  const listEl = document.getElementById('option-list');
  listEl.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-letter">' + letters[idx] + '</span><span>' + opt.text + '</span>';
    btn.onclick = () => selectOption(opt);
    listEl.appendChild(btn);
  });

  document.getElementById('prev-btn').style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
}

function selectOption(option) {
  userAnswers[currentQuestionIndex] = option.scores;

  if (currentQuestionIndex < QUESTIONS.length - 1) {
    currentQuestionIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQuestionIndex > 0) {
    currentQuestionIndex--;
    renderQuestion();
  }
}

// ===================== 점수 계산 =====================
function calculateResult() {
  const totals = { OUT: 0, SLU: 0, SWA: 0, BOP: 0, COU: 0 };

  userAnswers.forEach(scoreObj => {
    if (!scoreObj) return;
    Object.keys(scoreObj).forEach(key => {
      totals[key] += scoreObj[key];
    });
  });

  let maxScore = -1;
  let topTypes = [];
  Object.keys(totals).forEach(key => {
    if (totals[key] > maxScore) {
      maxScore = totals[key];
      topTypes = [key];
    } else if (totals[key] === maxScore) {
      topTypes.push(key);
    }
  });

  if (topTypes.length > 1) {
    return 'BOP';
  }
  return topTypes[0];
}

// ===================== 결과 렌더링 =====================
function showResult() {
  const resultKey = calculateResult();
  renderResultByType(resultKey);
  showScreen('screen-result');
}

function renderResultByType(typeKey) {
  const t = TYPES[typeKey];

  document.getElementById('result-type-name').textContent = t.name;
  document.getElementById('result-copy-sub').textContent = t.copySub;
  document.getElementById('result-quote').textContent = '"' + t.quote + '"';
  document.getElementById('result-desc').textContent = t.desc;

  const charBox = document.getElementById('result-char-box');
  charBox.innerHTML = '';
  const img = new Image();
  img.onload = () => {
    charBox.innerHTML = '';
    charBox.appendChild(img);
  };
  img.onerror = () => {
    charBox.textContent = t.name + ' 캐릭터 이미지';
  };
  img.src = t.image;
  img.alt = t.name + ' 캐릭터 일러스트';

  document.getElementById('feature-title').textContent = t.name + '는 어떻게 싸울까?';
  const featureListEl = document.getElementById('feature-list');
  featureListEl.innerHTML = '';
  t.features.forEach(f => {
    const div = document.createElement('div');
    div.className = 'feature-item';
    div.innerHTML = '<span class="feature-dot">•</span><span>' + f + '</span>';
    featureListEl.appendChild(div);
  });

  document.getElementById('strength-good').textContent = t.good;
  document.getElementById('strength-bad').textContent = t.bad;

  document.getElementById('vs-best-name').textContent = '최고의 상대 — ' + t.vsBest.name;
  document.getElementById('vs-best-reason').textContent = t.vsBest.reason;
  document.getElementById('vs-worst-name').textContent = '최악의 상대 — ' + t.vsWorst.name;
  document.getElementById('vs-worst-reason').textContent = t.vsWorst.reason;

  const otherEl = document.getElementById('other-types');
  otherEl.innerHTML = '';
  TYPE_ORDER.filter(key => key !== typeKey).forEach(key => {
    const pill = document.createElement('div');
    pill.className = 'other-pill';
    pill.textContent = TYPES[key].name;
    pill.onclick = () => renderResultByType(key);
    otherEl.appendChild(pill);
  });

  renderRadarChart(t.stats);
}

function renderRadarChart(stats) {
  const labels = Object.keys(stats);
  const values = Object.values(stats);

  if (radarChartInstance) {
    radarChartInstance.destroy();
  }

  const ctx = document.getElementById('radarChart');
  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: 'rgba(201, 58, 56, 0.15)',
        borderColor: '#c93a38',
        borderWidth: 2,
        pointBackgroundColor: '#c93a38',
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { display: false, stepSize: 25 },
          grid: { color: '#e5dac5' },
          angleLines: { color: '#e5dac5' },
          pointLabels: { font: { size: 12 }, color: '#444' }
        }
      }
    }
  });
}

// ===================== 이미지 저장 =====================
document.addEventListener('DOMContentLoaded', function () {
  const saveBtn = document.getElementById('save-image-btn');
  saveBtn.addEventListener('click', function () {
    const resultScreen = document.getElementById('screen-result');
    const btn = this;
    const originalText = btn.textContent;
    btn.textContent = '저장 중...';
    btn.disabled = true;

    html2canvas(resultScreen, {
      backgroundColor: '#fcf4ea',
      scale: 2,
      useCORS: true
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = '내복싱스타일_결과.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.textContent = originalText;
      btn.disabled = false;
    }).catch(err => {
      console.error('이미지 저장 실패:', err);
      alert('이미지 저장에 실패했어요. 다시 시도해주세요.');
      btn.textContent = originalText;
      btn.disabled = false;
    });
  });
});
